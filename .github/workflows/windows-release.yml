name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "cap-v*"

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Windows x64 installer
    runs-on: windows-2022
    timeout-minutes: 360
    env:
      RUST_TARGET_TRIPLE: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read release metadata
        id: metadata
        shell: pwsh
        run: |
          $cargoToml = Get-Content "apps/desktop/src-tauri/Cargo.toml" -Raw
          if ($cargoToml -notmatch '(?m)^version = "([^"]+)"\r?$') {
            throw "Could not read package.version from apps/desktop/src-tauri/Cargo.toml"
          }

          $version = $Matches[1]
          $tag = "cap-v$version"
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne $tag) {
            throw "Tag '${{ github.ref_name }}' does not match Cargo version '$version'. Expected '$tag'."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: x86_64-pc-windows-msvc

      - name: Configure Rust cache
        uses: ./.github/actions/setup-rust-cache
        with:
          target: x86_64-pc-windows-msvc
          save-cache: "true"

      - name: Install JavaScript dependencies
        uses: ./.github/actions/setup-js

      - name: Create build environment
        shell: pwsh
        run: |
          @"
          appVersion=${{ steps.metadata.outputs.version }}
          VITE_ENVIRONMENT=production
          NEXT_PUBLIC_WEB_URL=https://cap.so
          NEXTAUTH_URL=https://cap.so
          VITE_SERVER_URL=https://cap.so
          RUST_TARGET_TRIPLE=x86_64-pc-windows-msvc
          "@ | Set-Content .env

      - name: Prepare native dependencies
        run: pnpm -w cap-setup

      - name: Build desktop sidecars
        shell: bash
        run: ./scripts/build-desktop-binaries.sh x86_64-pc-windows-msvc

      - name: Increase pagefile size
        uses: al-cheb/configure-pagefile-action@a3b6ebd6b634da88790d9c58d4b37a7f4a7b8708
        with:
          minimum-size: 16GB
          maximum-size: 24GB
          disk-root: "D:"

      - name: Build NSIS installer
        working-directory: apps/desktop
        run: pnpm build:tauri --target x86_64-pc-windows-msvc --config src-tauri/tauri.github-release.conf.json --bundles nsis
        env:
          CI: false

      - name: Stage installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem "target/x86_64-pc-windows-msvc/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer was not produced."
          }

          New-Item -ItemType Directory -Path "release-assets" -Force | Out-Null
          Copy-Item $installer.FullName "release-assets/Cap-${{ steps.metadata.outputs.version }}-windows-x64-setup.exe"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cap-${{ steps.metadata.outputs.version }}-windows-x64
          path: release-assets/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.version }}
          target_commitish: ${{ github.sha }}
          body: |
            ## 下载

            - [Windows x64 安装包](https://github.com/${{ github.repository }}/releases/download/${{ steps.metadata.outputs.tag }}/Cap-${{ steps.metadata.outputs.version }}-windows-x64-setup.exe)

            此安装包未进行商业代码签名，Windows SmartScreen 可能会显示安全提示。
          generate_release_notes: true
          files: release-assets/*.exe
          fail_on_unmatched_files: true
